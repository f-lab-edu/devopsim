name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
  push:
    branches: [main]
    paths:
      - "packages/**"

env:
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  # 1. 변경된 서비스 감지
  detect:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'packages/api/**'
              - 'packages/shared/**'

  # 2. 테스트
  test:
    needs: detect
    if: needs.detect.outputs.api == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: devopsim_test
          POSTGRES_USER: devopsim
          POSTGRES_PASSWORD: devopsim
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://devopsim:devopsim@localhost:5432/devopsim_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build -w packages/shared

      - name: Run migrations
        run: npm run migrate -w packages/api

      - name: Run tests
        run: npm test -w packages/api

  # 3. Build & ECR Push
  build:
    needs: [detect, test]
    if: |
      github.event_name == 'push' &&
      needs.detect.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC 토큰 발급
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get build metadata
        id: meta
        run: |
          echo "version=$(node -p "require('./packages/api/package.json').version")" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build and push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/devopsim/api:${{ github.sha }}
          build-args: |
            BUILD_VERSION=${{ steps.meta.outputs.version }}
            BUILD_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.date }}
            BUILD_SERVICE=api
          cache-from: type=gha
          cache-to: type=gha,mode=max
