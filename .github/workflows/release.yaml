name: Release
run-name: >-
  ${{ startsWith(github.ref, 'refs/tags/')
    && format('Release — {0}', github.ref_name)
    || format('release-please — {0}', github.event.head_commit.message) }}

on:
  # 1. main push → release-please job (Release PR 생성/업데이트)
  push:
    branches: [main]
    tags:
      - '*-v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  # ── Job 1: Release PR 생성/업데이트 ──────────────────────────────────
  release-please:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── Job 2: ECR retag + Helm values 업데이트 ──────────────────────────
  # tag push(api-v1.2.3) 시 실행
  # 레이스 컨디션: CI 빌드보다 태그 생성이 빠를 수 있으므로 이미지 대기 루프
  deploy:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # 태그에서 SERVICE, VERSION, SHA 파싱
      - name: Parse tag
        id: tag
        run: |
          TAG="${{ github.ref_name }}"
          SERVICE=$(echo "$TAG" | sed 's/-v[0-9].*//')
          VERSION=$(echo "$TAG" | sed 's/.*-v//')
          SHA=$(git rev-list -n 1 "$TAG")
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA"         >> "$GITHUB_OUTPUT"
          echo "Parsed: service=$SERVICE version=$VERSION sha=$SHA"

      # AWS 인증
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ECR 이미지 대기 + retag (:sha → :version)
      # 태그 생성 시점에 CI 빌드가 아직 완료 안 됐을 수 있으므로 최대 10분 대기
      - name: Wait for image and retag
        run: |
          SERVICE="${{ steps.tag.outputs.service }}"
          VERSION="${{ steps.tag.outputs.version }}"
          SHA="${{ steps.tag.outputs.sha }}"
          REPO="devopsim/$SERVICE"

          echo "Waiting for $REPO:$SHA to appear in ECR..."
          for i in $(seq 1 20); do
            MANIFEST=$(aws ecr batch-get-image \
              --repository-name "$REPO" \
              --image-ids imageTag="$SHA" \
              --query 'images[0].imageManifest' \
              --output text 2>/dev/null)

            if [ -n "$MANIFEST" ] && [ "$MANIFEST" != "None" ]; then
              echo "Image found on attempt $i"
              break
            fi

            if [ "$i" -eq 20 ]; then
              echo "Error: $REPO:$SHA not found after 20 attempts (10min)"
              exit 1
            fi

            echo "Attempt $i/20 — not ready yet, waiting 30s..."
            sleep 30
          done

          OUTPUT=$(aws ecr put-image \
            --repository-name "$REPO" \
            --image-tag "$VERSION" \
            --image-manifest "$MANIFEST" 2>&1) || {
            if echo "$OUTPUT" | grep -q "ImageAlreadyExistsException"; then
              echo "Tag $VERSION already exists in ECR — skipping"
            else
              echo "$OUTPUT"
              exit 1
            fi
          }

          echo "Retagged $REPO:$SHA → $REPO:$VERSION"

      # values-production.yaml + Chart.yaml appVersion 업데이트
      - name: Update Helm values
        run: |
          SERVICE="${{ steps.tag.outputs.service }}"
          VERSION="${{ steps.tag.outputs.version }}"
          VALUES="infra/helm/$SERVICE/values-production.yaml"
          CHART="infra/helm/$SERVICE/Chart.yaml"

          sed -i "s/^  tag: .*/  tag: \"$VERSION\"/" "$VALUES"
          echo "Updated $VALUES → tag: $VERSION"

          sed -i "s/^appVersion: .*/appVersion: \"$VERSION\"/" "$CHART"
          echo "Updated $CHART → appVersion: $VERSION"

      # Git 커밋 + Push → FluxCD 배포 트리거
      - name: Commit and push
        run: |
          SERVICE="${{ steps.tag.outputs.service }}"
          VERSION="${{ steps.tag.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "infra/helm/$SERVICE/values-production.yaml" \
                  "infra/helm/$SERVICE/Chart.yaml"
          git commit -m "chore: release $SERVICE v$VERSION [skip ci]"
          git pull --rebase origin main
          git push origin main

      # GitHub Release에 ECR 이미지 정보 추가 (release-please가 이미 생성)
      - name: Update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          IMAGE="${{ env.ECR_REGISTRY }}/devopsim/${{ steps.tag.outputs.service }}:${{ steps.tag.outputs.version }}"

          gh release edit "$TAG" \
            --notes-append $'\n---\n**ECR 이미지**: `'"$IMAGE"'`'
