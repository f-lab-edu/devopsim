services:
  api:
    build:
      context: ../../
      dockerfile: packages/api/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    restart: on-failure:3
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 5s
    depends_on:
      migrate:
        condition: service_completed_successfully

  migrate:
    build:
      context: ../../
      dockerfile: packages/api/Dockerfile
    env_file: .env
    command: ["node_modules/.bin/node-pg-migrate", "-m", "packages/api/migrations", "up"]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: on-failure:3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devopsim"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
      start_interval: 5s

volumes:
  postgres_data:
