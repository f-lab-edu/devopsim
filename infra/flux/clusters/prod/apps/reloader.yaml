apiVersion: v1
kind: Namespace
metadata:
  name: reloader
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: stakater
  namespace: reloader
spec:
  interval: 1h
  url: https://stakater.github.io/stakater-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: reloader
spec:
  interval: 5m
  chart:
    spec:
      chart: reloader
      version: "2.2.11"
      sourceRef:
        kind: HelmRepository
        name: stakater
        namespace: reloader
  values:
    reloader:
      # auto: false → annotation 명시한 Deployment만 watch
      watchGlobally: true
      reloadOnCreate: true

      deployment:
        nodeSelector:
          eks.amazonaws.com/nodegroup: devopsim-prod-node-group
