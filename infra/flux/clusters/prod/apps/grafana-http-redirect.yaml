# grafana.devopsim.cloud HTTP → HTTPS 301 redirect.
#
# web(HTTP) listener에 부착해 들어오는 HTTP 트래픽을 HTTPS로 강제 전환.
# ACME challenge path는 cert-manager의 임시 HTTPRoute가 더 긴 prefix로 우선.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-http-redirect
  namespace: monitoring
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: web
  hostnames:
    - grafana.devopsim.cloud
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
