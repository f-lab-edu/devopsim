apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 1h
  url: https://charts.external-secrets.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 5m
  chart:
    spec:
      chart: external-secrets
      version: "2.4.1"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: external-secrets
  values:
    installCRDs: true

    # 차트 기본 ServiceAccount(external-secrets)에 IRSA 어노테이션 부여
    # Terraform external_secrets IAM 역할 Trust Policy의 sub와 일치:
    # system:serviceaccount:external-secrets:external-secrets
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::893286712531:role/devopsim-prod-external-secrets-role

    # 닭/달걀 방지: 관리형 노드 그룹에 고정
    nodeSelector:
      eks.amazonaws.com/nodegroup: devopsim-prod-node-group
    webhook:
      nodeSelector:
        eks.amazonaws.com/nodegroup: devopsim-prod-node-group
    certController:
      nodeSelector:
        eks.amazonaws.com/nodegroup: devopsim-prod-node-group
---
# ClusterSecretStore — AWS Secrets Manager 연결
# auth.jwt.serviceAccountRef는 차트가 만든 ESO 컨트롤러 SA를 가리킴
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# api-secret — RDS 자격증명을 K8s Secret에 동기화
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-secret
  namespace: default
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: api-secret
    template:
      type: Opaque
      data:
        # Primary용 (Write 트래픽)
        database-url-write: "postgresql://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .dbname }}"
        # Replica용 (Read 트래픽)
        database-url-read: "postgresql://{{ .username }}:{{ .password }}@{{ .replica_host }}:{{ .port }}/{{ .dbname }}"
        # 기존 단일 URL (Read/Write 분리 코드 배포 전 잠시 사용)
        database-url: "postgresql://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .dbname }}"
  dataFrom:
    - extract:
        key: devopsim-prod/rds/master
