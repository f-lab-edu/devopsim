# api.devopsim.cloud HTTPS 트래픽 → api Service.
#
# HTTP 트래픽은 별도 HTTPRoute(api-http-redirect)가 301 redirect 처리.
# 이 HTTPRoute는 websecure(443) listener에만 부착해 HTTPS 트래픽만 받음.
#
# 이 manifest 하나가 두 자동화를 트리거:
#   1. external-dns: hostnames → Route53 A 레코드(api.devopsim.cloud → NLB)
#   2. cert-manager: Gateway annotation + websecure listener hostname 매칭 →
#      Certificate 자동 생성 → HTTP-01 challenge → api-tls Secret 발급
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api
  namespace: api
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure # HTTPS listener에만 부착
  hostnames:
    - api.devopsim.cloud
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: api
          port: 80 # api Service 포트, Traefik이 TLS 종료 후 평문으로 보내는 대상
