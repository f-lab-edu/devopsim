# grafana.devopsim.cloud HTTPS 트래픽 → Grafana Service (monitoring ns).
#
# HTTPRoute는 monitoring ns에 위치 (Service와 같은 ns → ReferenceGrant 불필요).
# parentRefs로 traefik ns의 Gateway를 cross-ns 참조.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: grafana-https # grafana 전용 HTTPS listener
  hostnames:
    - grafana.devopsim.cloud
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
