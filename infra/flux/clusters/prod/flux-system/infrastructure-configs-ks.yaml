# Operator를 사용하는 Custom Resource 설정 단계.
# - ClusterSecretStore + ExternalSecret (ESO CRD 사용)
# - NodePool + EC2NodeClass (Karpenter CRD 사용)
#
# Controllers가 설치되어 CRD가 등록된 후에만 적용 가능 → dependsOn + healthChecks로 보장.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-configs
  namespace: flux-system
spec:
  interval: 10m
  path: ./infra/flux/clusters/prod/infrastructure/configs
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infrastructure-controllers
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: external-secrets
      namespace: external-secrets
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: karpenter
      namespace: kube-system
  timeout: 5m
