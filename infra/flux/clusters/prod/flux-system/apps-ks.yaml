# 애플리케이션 단계 — 인프라(controllers + configs)가 모두 준비된 후 배포.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  path: ./infra/flux/clusters/prod/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infrastructure-configs
  timeout: 5m
