# Operator/Controller 설치 단계.
# 다른 모든 단계가 의존하는 기반 컨트롤러들 (ESO, Karpenter, Reloader 등).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-controllers
  namespace: flux-system
spec:
  interval: 10m
  path: ./infra/flux/clusters/prod/infrastructure/controllers
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
