# ClusterSecretStore — AWS Secrets Manager 연결
# auth.jwt.serviceAccountRef는 ESO 컨트롤러 SA(external-secrets) 가리킴
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# api-secret — RDS 자격증명을 K8s Secret에 동기화
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-secret
  namespace: default
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: api-secret
    template:
      type: Opaque
      data:
        # Primary용 (Write 트래픽)
        database-url-write: "postgresql://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .dbname }}"
        # Replica용 (Read 트래픽)
        database-url-read: "postgresql://{{ .username }}:{{ .password }}@{{ .replica_host }}:{{ .port }}/{{ .dbname }}"
        # 기존 단일 URL (Read/Write 분리 코드 배포 전 잠시 사용)
        database-url: "postgresql://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .dbname }}"
  dataFrom:
    - extract:
        key: devopsim-prod/rds/master
