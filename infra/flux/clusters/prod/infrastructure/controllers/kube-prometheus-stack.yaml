apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: monitoring
spec:
  interval: 1h
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 5m
  timeout: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "84.5.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
  values:
    crds:
      enabled: true

    # ── Prometheus 서버 ────────────────────────────────────────────────
    prometheus:
      prometheusSpec:
        retention: 15d
        # 다른 namespace의 ServiceMonitor도 자동 발견하려면 false 필수.
        # true(default) 면 release label 매칭만 되어 우리 api ServiceMonitor 누락됨.
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        # TSDB 영속화 — Pod 재시작 시 메트릭 유지
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: gp3
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
      ingress:
        enabled: true
        ingressClassName: alb
        annotations:
          alb.ingress.kubernetes.io/scheme: internet-facing
          alb.ingress.kubernetes.io/target-type: ip
          alb.ingress.kubernetes.io/group.name: monitoring
        paths:
          - /
        pathType: Prefix

    # ── Grafana ────────────────────────────────────────────────────────
    grafana:
      # default: admin / prom-operator (학습 환경)
      adminPassword: prom-operator
      defaultDashboardsEnabled: true
      ingress:
        enabled: true
        ingressClassName: alb
        annotations:
          alb.ingress.kubernetes.io/scheme: internet-facing
          alb.ingress.kubernetes.io/target-type: ip
          alb.ingress.kubernetes.io/group.name: monitoring
        path: /

    # ── Alertmanager ───────────────────────────────────────────────────
    alertmanager:
      enabled: true
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: gp3
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 2Gi
      ingress:
        enabled: true
        ingressClassName: alb
        annotations:
          alb.ingress.kubernetes.io/scheme: internet-facing
          alb.ingress.kubernetes.io/target-type: ip
          alb.ingress.kubernetes.io/group.name: monitoring
        paths:
          - /
        pathType: Prefix

    # ── kube-state-metrics, node-exporter ──────────────────────────────
    # 둘 다 default enabled — 추가 설정 없이 그대로
