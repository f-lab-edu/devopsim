apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: monitoring
spec:
  interval: 1h
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 5m
  timeout: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "84.5.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
  values:
    crds:
      enabled: true

    # EKSлҠ” control planeмқҙ AWS managedлқј мқјл¶Җ м»ҙнҸ¬л„ҢнҠёк°Җ л©”нҠёлҰӯ л…ём¶ң X.
    # chartмқҳ default ruleмқҙ н•ӯмғҒ firing мғҒнғң (false positive). л№„нҷңм„ұнҷ”.
    defaultRules:
      rules:
        kubeControllerManager: false # EKS managed
        kubeScheduler: false # EKS managed
        etcd: false # EKS managed

    # в”Җв”Җ Prometheus м„ңлІ„ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    prometheus:
      prometheusSpec:
        retention: 15d
        retentionSize: 8GB
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi
        # Karpenterм—җ medium мқёмҠӨн„ҙмҠӨ(t3a.medium=4GB) к°•м ң вҖ” t3a.small(1.96GB)м—җм„  л©”лӘЁлҰ¬ spike мӢң л…ёл“ң OOM
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: karpenter.k8s.aws/instance-size
                      operator: In
                      values: ["medium"]
        # лӢӨлҘё namespaceмқҳ ServiceMonitorлҸ„ мһҗлҸҷ л°ңкІ¬н•ҳл Өл©ҙ false н•„мҲҳ.
        # true(default) л©ҙ release label л§Өм№ӯл§Ң лҗҳм–ҙ мҡ°лҰ¬ api ServiceMonitor лҲ„лқҪлҗЁ.
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        # TSDB мҳҒмҶҚнҷ” вҖ” Pod мһ¬мӢңмһ‘ мӢң л©”нҠёлҰӯ мң м§Җ
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: gp3
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
      # UIлҠ” мҷёл¶Җ л…ём¶ң м•Ҳ н•Ё вҖ” port-forwardлЎң м ‘к·ј.
      # мқёмҰқ м—ҶлҠ” internet-facingмқҖ ліҙм•ҲмғҒ мң„н—ҳ.
      ingress:
        enabled: false

    # в”Җв”Җ Grafana в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    grafana:
      adminPassword: admin
      defaultDashboardsEnabled: true

      # LokiлҘј datasourceлЎң м¶”к°Җ вҖ” sidecar(datasource provisioner)к°Җ мһҗлҸҷ к°җм§Җ.
      # kube-prometheus-stackмқҖ кё°ліё Prometheusл§Ң л“ұлЎқн•ҳлҜҖлЎң LokiлҠ” лӘ…мӢң.
      additionalDataSources:
        - name: Loki
          type: loki
          access: proxy
          url: http://loki.monitoring.svc.cluster.local:3100
          isDefault: false
          jsonData:
            maxLines: 1000

      dashboards:
        default:
          prometheus-all-metrics:
            gnetId: 19268
            revision: 1
            datasource: Prometheus
          # 19341мқҖ ${DS_EU02} ліҖмҲҳк°Җ мһҲм–ҙ gnetId мһҗлҸҷ м№ҳнҷҳ мӢӨнҢЁ вҶ’ ConfigMapмңјлЎң м§Ғм ‘ л°•мқҢ
          # (configs/grafana-dashboard-prometheus-cardinality.yaml)
      # downloadлҗң JSONмқҙ importлҗҳл Өл©ҙ file-based provider н•„мҡ”.
      # sc-dashboardproviders (sidecarмҡ©)л§Ң мһҲм–ҙм„ң мң„ dashboardsк°Җ import м•Ҳ лҗҗлҚҳ л¬ём ң мҲҳм •.
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: default
              orgId: 1
              folder: ""
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/default
      ingress:
        enabled: true
        ingressClassName: alb
        annotations:
          alb.ingress.kubernetes.io/scheme: internet-facing
          alb.ingress.kubernetes.io/target-type: ip
          alb.ingress.kubernetes.io/group.name: monitoring
        path: /

    # в”Җв”Җ Alertmanager в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    alertmanager:
      enabled: true
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: gp3
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 2Gi
        # ExternalSecretмқҙ л§Ңл“  K8s Secretмқ„ Podм—җ л§ҲмҡҙнҠё
        # вҶ’ /etc/alertmanager/secrets/<secret-name>/url м—җм„ң webhook URL мқҪмқҢ
        secrets:
          - alertmanager-slack
          - alertmanager-healthchecks

      # лқјмҡ°нҢ…/receiver м„Өм •. кё°ліёмқҖ 'null' receiver(м•ҢлҰј л¬ҙмӢң)лқј override н•„мҲҳ.
      config:
        global:
          resolve_timeout: 5m
        route:
          # alertname/severity/namespace мЎ°н•© вҖ” к°ҷмқҖ лҘҳ м•ҢлҰј л¬¶мқҢ
          group_by: ["alertname", "severity", "namespace"]
          group_wait: 30s # мІ« м•ҢлҰј м „ лҢҖкё° (к·ёлЈЁн•‘ мӢңк°„)
          group_interval: 5m # к°ҷмқҖ groupмқҳ мғҲ alert м¶”к°Җ мӢң лӢӨмқҢ м•ҢлҰј к°„кІ©
          repeat_interval: 4h # firing м§ҖмҶҚ мӢң мһ¬м•ҢлҰј мЈјкё°
          receiver: slack-default
          routes:
            - matchers:
                - severity = "critical"
              receiver: slack-critical
              group_wait: 10s
              repeat_interval: 1h

            - matchers:
                - alertname = "Watchdog"
              receiver: healthchecks-watchdog
              group_wait: 0s
              group_interval: 1m
              repeat_interval: 1m

            - matchers:
                - alertname = "InfoInhibitor"
              receiver: "null"

        receivers:
          - name: "null"

          - name: healthchecks-watchdog
            webhook_configs:
              - url_file: /etc/alertmanager/secrets/alertmanager-healthchecks/url
                send_resolved: false

          - name: slack-default
            slack_configs:
              - api_url_file: /etc/alertmanager/secrets/alertmanager-slack/url
                channel: "#devopsim-alerts"
                send_resolved: true
                title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
                text: |
                  {{ range .Alerts -}}
                  *severity*: {{ .Labels.severity }}
                  *summary*: {{ .Annotations.summary }}
                  *desc*: {{ .Annotations.description }}
                  {{ end }}

          - name: slack-critical
            slack_configs:
              - api_url_file: /etc/alertmanager/secrets/alertmanager-slack/url
                channel: "#devopsim-alerts"
                send_resolved: true
                title: "рҹ”Ҙ [CRITICAL] {{ .CommonLabels.alertname }}"
                text: |
                  <!here>
                  {{ range .Alerts -}}
                  *summary*: {{ .Annotations.summary }}
                  *desc*: {{ .Annotations.description }}
                  {{ end }}

      ingress:
        enabled: false

    # в”Җв”Җ kube-state-metrics, node-exporter в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    # л‘ҳ лӢӨ default enabled вҖ” м¶”к°Җ м„Өм • м—Ҷмқҙ к·ёлҢҖлЎң
