apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: monitoring
spec:
  interval: 1h
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 5m
  timeout: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "84.5.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
  values:
    crds:
      enabled: true

    # ── Prometheus 서버 ────────────────────────────────────────────────
    prometheus:
      prometheusSpec:
        retention: 15d
        retentionSize: 8GB
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi
        # Karpenter에 medium 인스턴스(t3a.medium=4GB) 강제 — t3a.small(1.96GB)에선 메모리 spike 시 노드 OOM
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: karpenter.k8s.aws/instance-size
                      operator: In
                      values: ["medium"]
        # 다른 namespace의 ServiceMonitor도 자동 발견하려면 false 필수.
        # true(default) 면 release label 매칭만 되어 우리 api ServiceMonitor 누락됨.
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        # TSDB 영속화 — Pod 재시작 시 메트릭 유지
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: gp3
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
      # UI는 외부 노출 안 함 — port-forward로 접근.
      # 인증 없는 internet-facing은 보안상 위험.
      ingress:
        enabled: false

    # ── Grafana ────────────────────────────────────────────────────────
    grafana:
      adminPassword: admin
      defaultDashboardsEnabled: true
      dashboards:
        default:
          prometheus-all-metrics:
            gnetId: 19268
            revision: 1
            datasource: Prometheus
          prometheus-metrics-management:
            gnetId: 19341
            revision: 1
            datasource: Prometheus
      # download된 JSON이 import되려면 file-based provider 필요.
      # sc-dashboardproviders (sidecar용)만 있어서 위 dashboards가 import 안 됐던 문제 수정.
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: default
              orgId: 1
              folder: ''
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/default
      ingress:
        enabled: true
        ingressClassName: alb
        annotations:
          alb.ingress.kubernetes.io/scheme: internet-facing
          alb.ingress.kubernetes.io/target-type: ip
          alb.ingress.kubernetes.io/group.name: monitoring
        path: /

    # ── Alertmanager ───────────────────────────────────────────────────
    alertmanager:
      enabled: true
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: gp3
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 2Gi
      # UI는 외부 노출 안 함 — port-forward 접근.
      ingress:
        enabled: false

    # ── kube-state-metrics, node-exporter ──────────────────────────────
    # 둘 다 default enabled — 추가 설정 없이 그대로
