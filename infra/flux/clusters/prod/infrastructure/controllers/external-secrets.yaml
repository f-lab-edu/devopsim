apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 1h
  url: https://charts.external-secrets.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 5m
  chart:
    spec:
      chart: external-secrets
      version: "2.4.1"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: external-secrets
  values:
    installCRDs: true

    # 차트 기본 ServiceAccount(external-secrets)에 IRSA 어노테이션 부여
    # Terraform (resource "aws_iam_role" "external_secrets") - Trust Policy(assume_role_policy)의 sub와 일치:
    # system:serviceaccount:external-secrets:external-secrets
    serviceAccount:
  annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::893286712531:role/devopsim-prod-external-secrets-role

    # 닭/달걀 방지: 관리형 노드 그룹에 고정 + CriticalAddonsOnly taint tolerate
    nodeSelector:
      eks.amazonaws.com/nodegroup: devopsim-prod-node-group
    tolerations:
      - key: CriticalAddonsOnly
        value: "true"
        operator: Equal
        effect: NoSchedule
    webhook:
      nodeSelector:
        eks.amazonaws.com/nodegroup: devopsim-prod-node-group
      tolerations:
        - key: CriticalAddonsOnly
          value: "true"
          operator: Equal
          effect: NoSchedule
    certController:
      nodeSelector:
        eks.amazonaws.com/nodegroup: devopsim-prod-node-group
      tolerations:
        - key: CriticalAddonsOnly
          value: "true"
          operator: Equal
          effect: NoSchedule
