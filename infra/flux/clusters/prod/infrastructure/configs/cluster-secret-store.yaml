# ClusterSecretStore — AWS Secrets Manager 연결
# auth.jwt.serviceAccountRef는 ESO 컨트롤러 SA(external-secrets) 가리킴
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# api-secret — RDS 자격증명을 K8s Secret에 동기화
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-secret
  namespace: api
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: api-secret
    template:
      type: Opaque
      data:
        # SSL 옵션 — node-pg 새 버전 호환:
        #  - RDS는 SSL 필수 (sslmode 없으면 "no encryption" 에러)
        #  - pg-connection-string v3+는 sslmode=require를 verify-full로 처리
        #    → AWS RDS Root CA가 시스템 CA store에 없어 SELF_SIGNED_CERT_IN_CHAIN 발생
        #  - uselibpqcompat=true → libpq 표준 동작 (require가 인증서 검증 안 함)
        # Primary용 (Write 트래픽)
        database-url-write: "postgresql://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .dbname }}?uselibpqcompat=true&sslmode=require"
        # Replica용 (Read 트래픽)
        database-url-read: "postgresql://{{ .username }}:{{ .password }}@{{ .replica_host }}:{{ .port }}/{{ .dbname }}?uselibpqcompat=true&sslmode=require"
        # 기존 단일 URL (Read/Write 분리 코드 배포 전 잠시 사용)
        database-url: "postgresql://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .dbname }}?uselibpqcompat=true&sslmode=require"
  dataFrom:
    - extract:
        key: devopsim-prod/rds/master
