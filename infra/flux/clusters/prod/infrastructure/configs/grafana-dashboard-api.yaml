# devopsim-api 전용 dashboard.
# grafana_dashboard: "1" label로 kube-prometheus-stack의 grafana-sc-dashboard
# sidecar가 watch → 자동 import.
apiVersion: v1
kind: ConfigMap
metadata:
  name: devopsim-api-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  devopsim-api.json: |
    {
      "title": "devopsim-api",
      "uid": "devopsim-api",
      "tags": ["devopsim", "api"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "15s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Cache Hit Ratio",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "sum(rate(cache_hits_total[5m])) / (sum(rate(cache_hits_total[5m])) + sum(rate(cache_misses_total[5m])))",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red",    "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "green",  "value": 0.8 }
                ]
              }
            }
          },
          "options": { "colorMode": "background" }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Items in DB",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "targets": [{ "expr": "max(items_total)", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Error Rate (rps)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "targets": [{ "expr": "sum(rate(app_errors_total[5m]))", "refId": "A" }],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green",  "value": null },
                  { "color": "yellow", "value": 0.1 },
                  { "color": "red",    "value": 1 }
                ]
              }
            }
          },
          "options": { "colorMode": "background" }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "In-flight Requests",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "targets": [{ "expr": "sum(http_requests_in_flight)", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "HTTP Request Rate by Route",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 4, "w": 24, "h": 8 },
          "targets": [
            {
              "expr": "sum by (route) (rate(http_requests_total[1m]))",
              "legendFormat": "{{route}}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "HTTP Latency (p50/p95/p99)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 12, "w": 24, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le) (rate(http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "DB Query p95 by Operation",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 20, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, operation) (rate(db_query_duration_seconds_bucket[5m])))",
              "legendFormat": "{{operation}}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "PG Pool State",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 12, "y": 20, "w": 12, "h": 8 },
          "targets": [
            { "expr": "sum(pg_pool_total_connections)",  "legendFormat": "total",   "refId": "A" },
            { "expr": "sum(pg_pool_idle_connections)",   "legendFormat": "idle",    "refId": "B" },
            { "expr": "sum(pg_pool_waiting_clients)",    "legendFormat": "waiting", "refId": "C" }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "HTTP Status Code 분포",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 28, "w": 24, "h": 8 },
          "targets": [
            {
              "expr": "sum by (status_code) (rate(http_requests_total[5m]))",
              "legendFormat": "{{status_code}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps" },
            "overrides": [
              {
                "matcher": { "id": "byRegexp", "options": "^2" },
                "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }]
              },
              {
                "matcher": { "id": "byRegexp", "options": "^4" },
                "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "yellow" } }]
              },
              {
                "matcher": { "id": "byRegexp", "options": "^5" },
                "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }]
              }
            ]
          }
        }
      ]
    }
