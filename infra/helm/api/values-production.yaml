replicaCount: 2

image:
  repository: 893286712531.dkr.ecr.us-east-2.amazonaws.com/devopsim/api
  tag: "0.10.0"
  pullPolicy: Always

redis:
  url: "redis://redis.redis.svc.cluster.local:6379"

serviceMonitor:
  enabled: true

# ALB Ingress는 Traefik(NLB + Gateway API HTTPRoute)로 대체됨 → 비활성.
# 외부 노출은 infra/flux/.../apps/api-httproute.yaml이 담당.
ingress:
  enabled: false

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50

topologySpread:
  enabled: true
  maxSkew: 1
  whenUnsatisfiable: ScheduleAnyway

reloader:
  enabled: true
  secrets: api-secret
