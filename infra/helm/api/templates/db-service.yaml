{{- if .Values.db.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: db
  labels:
    {{- include "api.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: db
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: postgres
      port: {{ .Values.db.port }}
      targetPort: 5432
      protocol: TCP
{{- end }}
