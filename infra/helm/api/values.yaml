replicaCount: 1

image:
  repository: devopsim-api
  pullPolicy: IfNotPresent
  tag: "" # 비워두면 Chart.yaml의 appVersion 사용

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: nginx
  host: ""
  annotations: {}

apiSecretName: api-secret

resources: {}
#  requests:
#    cpu: "100m"
#    memory: "128Mi"
#  limits:
#    cpu: "500m"
#    memory: "256Mi"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50

topologySpread:
  enabled: false
  maxSkew: 1
  whenUnsatisfiable: ScheduleAnyway

# Stakater Reloader: api-secret 변경 시 Deployment 자동 rolling restart
# ESO가 RDS 자격증명 갱신할 때 Pod 재시작 트리거
reloader:
  enabled: false
  # 쉼표 구분으로 여러 Secret 가능 ("api-secret,redis-secret")
  secrets: api-secret
