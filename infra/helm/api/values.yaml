replicaCount: 1

image:
  repository: devopsim-api
  pullPolicy: IfNotPresent
  tag: "" # 비워두면 Chart.yaml의 appVersion 사용

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: nginx
  host: ""
  annotations: {}

db:
  host: db # db Chart의 Service 이름
  port: 5432

apiSecretName: api-secret

waitForDb:
  enabled: true

resources: {}
