replicaCount: 1

image:
  repository: devopsim-api
  pullPolicy: IfNotPresent
  tag: "" # 비워두면 Chart.yaml의 appVersion 사용

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: nginx
  host: ""
  annotations: {}

db:
  enabled: true          # false로 하면 StatefulSet 안 만들어짐 (production RDS 사용 시)
  host: db
  port: 5432
  user: devopsim
  secretName: postgres-secret  # StatefulSet용 (POSTGRES_USER/PASSWORD/DB)
  storage: 1Gi
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent

apiSecretName: api-secret  # api Deployment용 (DATABASE_URL)

waitForDb:
  enabled: true

resources: {}
#  requests:
#    cpu: "100m"
#    memory: "128Mi"
#  limits:
#    cpu: "500m"
#    memory: "256Mi"
